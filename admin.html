<!DOCTYPE html>

<html>
<head>
<link rel="stylesheet" href="css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="center">

<h2 class="title-main">ADMIN PANEL</h2>
<h3 class="title-sub">Festival of Fire Control</h3>

<!-- ADD TEAM -->

<h3>Add Team</h3>
<input id="team" placeholder="Team Name">
<select id="sport">
<option>basketball</option>
<option>volleyball</option>
<option>softball</option>
</select>
<button onclick="addTeam()">Add</button>

<!-- DELETE TEAM -->

<h3>Delete Team</h3>
<input id="teamDelete" placeholder="Team Name">
<select id="sportDelete">
<option>basketball</option>
<option>volleyball</option>
<option>softball</option>
</select>
<button onclick="deleteTeam()">Delete</button>

<!-- UPDATE SCORE -->

<h3>Update Score</h3>
<input id="teamScore" placeholder="Team Name">
<input id="wins" type="number" placeholder="Wins">
<input id="losses" type="number" placeholder="Losses">
<button onclick="updateScore()">Update</button>

<!-- ADD SCHEDULE -->

<h3>Add Schedule</h3>
<input id="a" placeholder="Team A">
<input id="b" placeholder="Team B">
<input id="dt" type="datetime-local">
<button onclick="addSchedule()">Add</button>

<!-- UPDATE SCHEDULE -->

<h3>Update Schedule</h3>
<input id="schedIndex" type="number" placeholder="Schedule Index">
<input id="newDT" type="datetime-local">
<button onclick="updateSchedule()">Update</button>

</div>

<script src="js/app.js"></script>

</body>
</html>
